volumes:
  datapr_pg_data:

services:
  datapr-db:
    image: postgres:17.0
    env_file: .env
    ports:
      - 5432:5432
    volumes:
      - datapr_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  datapr-backend:
    build: .
    env_file: .env
    depends_on:
      datapr-db:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - 8001:8001
    volumes:
      - .:/datapr_app


